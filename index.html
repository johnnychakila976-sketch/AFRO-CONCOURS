<!doctype html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afro Concours 👑</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    html, body { margin:0; padding:0; height:100%; font-family:Outfit; background:#0a0a0f; color:white; }
    * { box-sizing:border-box; }

    .hidden { display:none; }
  </style>
</head>

<body>

<div id="app" class="h-full flex flex-col">

  <!-- TOAST -->
  <div id="toast-container" class="fixed top-4 left-1/2 -translate-x-1/2 z-50"></div>

  <!-- ONBOARD -->
  <div id="screen-onboard" class="h-full flex flex-col items-center justify-center p-6">

    <h1 class="text-3xl font-black mb-6">👑 Afro Concours</h1>

    <input id="input-pseudo" class="p-3 mb-2 w-full bg-gray-900 rounded" placeholder="Pseudo">
    <input id="input-numero" class="p-3 mb-2 w-full bg-gray-900 rounded" placeholder="WhatsApp">
    <input id="input-email" class="p-3 mb-4 w-full bg-gray-900 rounded" placeholder="Email">

    <button id="btn-start" class="bg-yellow-400 text-black font-bold p-3 rounded w-full">
      Commencer 🚀
    </button>

    <button id="btn-login" class="mt-2 border p-3 rounded w-full">
      Connexion
    </button>

  </div>

  <!-- MAIN -->
  <div id="screen-main" class="hidden flex flex-col h-full">

    <header class="p-3 flex justify-between bg-purple-950">
      <div>👑 Afro Concours</div>

      <button id="adminBtn" class="text-yellow-400 hidden" onclick="switchTab('admin')">
        ADMIN
      </button>
    </header>

    <div class="flex-1 p-3 overflow-auto">

      <!-- HOME -->
      <div id="tab-home">
        <h2 class="text-xl font-bold">Bienvenue 👑</h2>
        <p id="user-info"></p>
      </div>

      <!-- ADMIN -->
      <div id="tab-admin" class="hidden">
        <h2 class="text-xl font-bold mb-3">📊 DASHBOARD ADMIN</h2>

        <div class="space-y-2">
          <div class="p-3 bg-gray-900 rounded">👥 Users: <span id="stat-users"></span></div>
          <div class="p-3 bg-gray-900 rounded">💰 Points: <span id="stat-points"></span></div>
          <div class="p-3 bg-gray-900 rounded">🎯 Missions: <span id="stat-missions"></span></div>
        </div>

      </div>

    </div>
  </div>

</div>

<script>

const ADMIN_EMAIL = "overzatchy@gmail.com";
const FORM_ENDPOINT = "https://formspree.io/f/mqewpdyb";

let allUsers = JSON.parse(localStorage.getItem("afro_users") || "[]");
let userData = JSON.parse(localStorage.getItem("afro_current_user") || "null");
let currentTab = "home";

function toast(msg){
  const t = document.createElement("div");
  t.innerText = msg;
  t.className = "bg-green-600 text-white p-2 rounded mb-2";
  document.getElementById("toast-container").appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

function save(){
  localStorage.setItem("afro_users", JSON.stringify(allUsers));
  localStorage.setItem("afro_current_user", JSON.stringify(userData));
}

async function sendForm(data){
  try {
    await fetch(FORM_ENDPOINT, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });
  } catch(e){}
}

// INSCRIPTION
document.getElementById("btn-start").onclick = async () => {

  const pseudo = document.getElementById("input-pseudo").value.trim();
  const numero = document.getElementById("input-numero").value.trim();
  const email = document.getElementById("input-email").value.trim();

  if(!pseudo || !numero || !email){
    toast("❌ Champs manquants");
    return;
  }

  userData = {
    pseudo,
    numero,
    email,
    kit:0,
    missions:[]
  };

  allUsers.push(userData);
  save();

  await sendForm({
    type:"register",
    pseudo,
    numero,
    email
  });

  document.getElementById("screen-onboard").classList.add("hidden");
  document.getElementById("screen-main").classList.remove("hidden");

  if(email === ADMIN_EMAIL){
    document.getElementById("adminBtn").classList.remove("hidden");
  }

  toast("👑 Bienvenue " + pseudo);

  render();
};

// LOGIN AUTO
function autoLogin(){
  if(userData){
    document.getElementById("screen-onboard").classList.add("hidden");
    document.getElementById("screen-main").classList.remove("hidden");

    if(userData.email === ADMIN_EMAIL){
      document.getElementById("adminBtn").classList.remove("hidden");
    }

    render();
  }
}

function render(){

  document.getElementById("user-info").innerText =
    userData?.pseudo + " | " + userData?.email;

  // admin stats
  let totalPoints = 0;
  let totalMissions = 0;

  allUsers.forEach(u=>{
    totalPoints += u.kit || 0;
    totalMissions += u.missions?.length || 0;
  });

  document.getElementById("stat-users").innerText = allUsers.length;
  document.getElementById("stat-points").innerText = totalPoints;
  document.getElementById("stat-missions").innerText = totalMissions;
}

// SWITCH TAB
function switchTab(tab){
  document.getElementById("tab-home").classList.add("hidden");
  document.getElementById("tab-admin").classList.add("hidden");

  if(tab === "home") document.getElementById("tab-home").classList.remove("hidden");
  if(tab === "admin") document.getElementById("tab-admin").classList.remove("hidden");

  currentTab = tab;
}

autoLogin();

</script>

</body>
</html>
