<!doctype html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afro Concours 👑</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    html, body { height: 100%; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
    * { box-sizing: border-box; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>

<body class="h-full bg-black text-white">

<div id="app" class="h-full w-full flex flex-col overflow-hidden">

<!-- ONBOARD -->
<div id="screen-onboard" class="h-full flex flex-col items-center justify-center p-6">
  <h1 class="text-3xl font-bold mb-6">Afro Concours 👑</h1>

  <input id="input-pseudo" placeholder="Pseudo" class="mb-3 p-3 rounded bg-violet-900/40 w-full max-w-xs">
  <input id="input-numero" placeholder="Numéro" class="mb-3 p-3 rounded bg-violet-900/40 w-full max-w-xs">
  <input id="input-email" placeholder="Email" class="mb-3 p-3 rounded bg-violet-900/40 w-full max-w-xs">

  <button id="btn-start" class="bg-yellow-400 text-black font-bold px-6 py-3 rounded w-full max-w-xs">
    Commencer 🚀
  </button>
</div>

<!-- MAIN -->
<div id="screen-main" style="display:none;" class="p-4">
  <h2>Bienvenue 👑</h2>
</div>

</div>

<script>
/* =======================
   FORMPSREE (AJOUT CLEAN)
======================= */
const FORMSPREE_URL = "https://formspree.io/f/mqewpdyb";

/* =======================
   DATA
======================= */
let allUsers = [];
let userData = null;
let isSubmitting = false;

/* =======================
   SUBMIT INSCRIPTION
======================= */
document.getElementById("btn-start").addEventListener("click", async () => {

  if (isSubmitting) return;

  const pseudo = document.getElementById("input-pseudo").value.trim();
  const numero = document.getElementById("input-numero").value.trim();
  const email = document.getElementById("input-email").value.trim();

  if (!pseudo || !numero || !email) return;

  isSubmitting = true;

  const newUser = {
    pseudo,
    numero,
    email,
    user_id: "AC-" + Math.random().toString(36).substr(2, 8).toUpperCase(),
    kit_boy: 0
  };

  allUsers.push(newUser);
  userData = newUser;

  /* =======================
     FORMPSREE ENVOI
  ======================= */
  fetch(FORMSPREE_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      pseudo: newUser.pseudo,
      numero: newUser.numero,
      email: newUser.email,
      user_id: newUser.user_id
    })
  }).catch(err => console.log("Formspree error:", err));

  /* =======================
     SWITCH UI
  ======================= */
  document.getElementById("screen-onboard").style.display = "none";
  document.getElementById("screen-main").style.display = "block";

  isSubmitting = false;
});
</script>

</body>
</html>
