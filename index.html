<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription</title>
</head>
<body>

  <h1>Créer un compte</h1>

  <form id="signupForm">
    <input type="text" id="nom" placeholder="Nom" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <input type="password" id="password" placeholder="Mot de passe" required><br><br>
    <button type="submit">S'inscrire</button>
  </form>

  <p id="message"></p>

  <script>
    const form = document.getElementById("signupForm");
    const message = document.getElementById("message");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const nom = document.getElementById("nom").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const scriptURL = "https://script.google.com/macros/s/AKfycbwJybnN0mLlnPGVnYqtsi3IewQyP3gx-9xAym-osS0H9W3m19xDjvji9UNbq3wrzLOqbg/exec";

      const formData = new FormData();
      formData.append("nom", nom);
      formData.append("email", email);
      formData.append("password", password);

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.success) {
          message.textContent = "Compte créé avec succès !";
          form.reset();
        } else {
          message.textContent = "Erreur : " + result.message;
        }

      } catch (error) {
        message.textContent = "Erreur réseau : " + error;
      }
    });
  </script>

</body>
</html>
