<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Afro Concours 👑</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { margin:0; font-family: Arial; background:#0a0a0f; color:white; }
.hidden { display:none; }
</style>
</head>

<body>

<!-- APP -->
<div id="app">

<!-- HEADER -->
<div style="padding:10px;background:#1a1a2e;display:flex;justify-content:space-between;">
  <div>👑 Afro Concours</div>
  <div>KB: <span id="points">0</span></div>
</div>

<!-- MISSIONS -->
<div id="missions"></div>

</div>

<script>
// ================= DATA =================
let userData = { kit_boy: 0, liste_violet: false };
let missionTimers = JSON.parse(localStorage.getItem("timers") || "{}");
let daily = JSON.parse(localStorage.getItem("daily") || "{}");
let cheat = 0;

const MISSIONS = [
  { id:"m1", label:"Connexion quotidienne", points:1, cooldown:86400000 },
  { id:"m2", label:"Mission rapide", points:2, cooldown:3600000 },
  { id:"m3", label:"Mission simple", points:1 }
];

// ================= SAVE =================
function save() {
  localStorage.setItem("timers", JSON.stringify(missionTimers));
  localStorage.setItem("daily", JSON.stringify(daily));
}

// ================= ANTI TRICHE =================
function trackAction(){
  cheat++;
  if(cheat > 15) alert("⚠️ activité suspecte");
  save();
}

// ================= COOLDOWN =================
function canDoMission(m){
  if(!m.cooldown) return true;

  let now = Date.now();
  let last = missionTimers[m.id] || 0;

  if(now - last < m.cooldown){
    return false;
  }

  missionTimers[m.id] = now;
  save();
  return true;
}

// ================= DAILY LIMIT =================
function canDoDaily(){
  let today = new Date().toDateString();

  if(daily.date !== today){
    daily.date = today;
    daily.count = 0;
  }

  if(daily.count >= 8){
    alert("limite journalière atteinte");
    return false;
  }

  daily.count++;
  save();
  return true;
}

// ================= VIP =================
function checkVIP(){
  if(userData.kit_boy >= 80){
    userData.liste_violet = true;
  }
}

// ================= COMPLETE =================
function complete(m){
  trackAction();

  if(!canDoDaily()) return;
  if(!canDoMission(m)) return;

  userData.kit_boy += m.points;

  checkVIP();

  document.getElementById("points").innerText = userData.kit_boy;

  render();
}

// ================= UI =================
function render(){
  let el = document.getElementById("missions");
  el.innerHTML = "";

  MISSIONS.forEach(m => {
    let div = document.createElement("div");
    div.style.padding = "10px";
    div.style.margin = "10px";
    div.style.background = "#2e1065";
    div.style.cursor = "pointer";

    div.innerHTML = `${m.label} (+${m.points})`;

    div.onclick = () => complete(m);

    el.appendChild(div);
  });
}

render();
</script>

</body>
</html>
