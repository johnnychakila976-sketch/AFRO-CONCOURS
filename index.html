  <style>
html, body { height: 100%; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }
* { box-sizing: border-box; }

@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes pulseGlow { 0%,100%{box-shadow:0 0 20px rgba(124,58,237,0.3)} 50%{box-shadow:0 0 40px rgba(124,58,237,0.6)} }
@keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

.float { animation: float 3s ease-in-out infinite; }
.pulse-glow { animation: pulseGlow 2s ease-in-out infinite; }
.slide-up { animation: slideUp 0.5s ease-out forwards; }
.shimmer-bg { background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.1) 50%, transparent 100%); background-size: 200% 100%; animation: shimmer 2s infinite; }

.toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
.toast { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 600; animation: slideUp 0.3s ease-out; }

.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; animation: slideUp 0.2s; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: #7c3aed; border-radius: 4px; }
::-webkit-scrollbar-track { background: transparent; }

button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>

 <body class="h-full bg-black text-white">

<script>
const FORMSPREE_URL = "https://formspree.io/f/mqewpdyb";
</script>

<script>
// CONFIG
const defaultConfig = {
  app_title: 'Afro Concours 👑',
  welcome_text: 'Gagne des Kit Boy, deviens VIP!',
};

let userData = null;
let allUsers = [];
let currentTab = 'home';
let confirmCallback = null;
let isSubmitting = false;
const ADMIN_EMAIL = 'overzatchy@gmail.com';

const MISSIONS = [
  { id: 'survey1', label: '📝 Sondage : Ta musique préférée ?', points: 1, prompt: 'Quel est ton artiste africain préféré ?' },
  { id: 'survey2', label: '📝 Sondage : Plat africain favori ?', points: 1, prompt: 'Quel plat africain aimes-tu le plus ?' },
  { id: 'watch1', label: '📺 Regarde du contenu (30s)', points: 1, prompt: 'Envoie un lien de la vidéo regardée' },
  { id: 'quiz1', label: '🧠 Quiz : Culture africaine', points: 15, prompt: 'Nom d\'une capitale africaine ?' },
  { id: 'invite1', label: '👥 Invite un ami', points: 3, prompt: 'Pseudo de l\'ami invité ?' },
  { id: 'daily1', label: '✨ Connexion quotidienne', points: 1, prompt: 'Quelle heure es-tu connecté ?' },
  { id: 'share1', label: '📤 Partage ta progression', points: 1, prompt: 'Où as-tu partagé ta progression ?' },
  { id: 'like1', label: '❤️ Like 10 posts', points: 1, prompt: 'Lien d\'un post liké ?' },
  { id: 'follow1', label: '👤 Follow 5 comptes', points: 1, prompt: 'Pseudo du compte suivi ?' },
  { id: 'hard1', label: '⭐ Cumule 5 jours consec', points: 3, prompt: 'Depuis combien de jours ?' },
  { id: 'tiktok1', label: '🎵 Crée un TikTok #AfroConcours', points: 2, prompt: 'Lien de ton TikTok ?' },
  { id: 'reels1', label: '📹 Crée un Reel Instagram', points: 2, prompt: 'Lien de ton Reel ?' },
  { id: 'vote1', label: '🗳️ Participe au vote du jour', points: 1, prompt: 'Pour quel choix as-tu voté ?' },
  { id: 'comment1', label: '💬 Commente 5 posts', points: 1, prompt: 'Ton meilleur commentaire ?' },
  { id: 'story1', label: '📸 Partage une story', points: 1, prompt: 'Description de ta story ?' },
  { id: 'invite5', label: '👥 Invite 5 amis', points: 5, prompt: 'Combien d\'amis invités ?' },

  { id: 'challenge1', label: '🎯 Participe au challenge', points: 3, prompt: 'Décris ta participation' },

];

// 🔥 RESTE DU CODE IDENTIQUE JUSQU’À handleSubmit

async function handleSubmit(event) {
  event.preventDefault();

  if (isSubmitting) return;

  const pseudo = document.getElementById('input-pseudo').value.trim();
  const numero = document.getElementById('input-numero').value.trim();
  const email = document.getElementById('input-email').value.trim();

  if (!pseudo || !numero || !email) return;

  isSubmitting = true;

  const newUser = {
    pseudo,
    numero,
    email,
    kit_boy: 0,
    user_id: 'AC-' + Math.random().toString(36).substr(2, 8).toUpperCase()
  };

  allUsers.push(newUser);
  userData = newUser;

  saveToLocalStorage();

  // ✅ FORMPSREE INTEGRATION AJOUTÉE
  fetch(FORMSPREE_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      pseudo: pseudo,
      numero: numero,
      email: email,
      user_id: newUser.user_id
    })
  }).catch(err => console.log("Formspree error:", err));

  document.getElementById('input-pseudo').value = '';
  document.getElementById('input-numero').value = '';
  document.getElementById('input-email').value = '';

  document.getElementById('screen-onboard').style.display = 'none';
  document.getElementById('screen-main').style.display = 'flex';

  isSubmitting = false;
  renderAll();
}

// RESTE DU CODE INCHANGÉ (UI, missions, render, etc.)
</script>
