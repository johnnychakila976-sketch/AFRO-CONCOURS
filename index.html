<!doctype html>
<html lang="fr" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afro Concours 👑</title>

  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    html,body{height:100%;margin:0;font-family:Outfit}
    *{box-sizing:border-box}
  </style>
</head>

<body class="bg-black text-white">

<div id="app" class="h-full flex flex-col">

  <!-- ONBOARD -->
  <div id="screen-onboard" class="flex flex-col items-center justify-center h-full p-6">
    <h1 class="text-3xl font-black mb-6">👑 Afro Concours</h1>

    <input id="input-pseudo" class="p-3 mb-2 w-full rounded bg-purple-900/40" placeholder="Pseudo">
    <input id="input-numero" class="p-3 mb-2 w-full rounded bg-purple-900/40" placeholder="WhatsApp">
    <input id="input-email" class="p-3 mb-4 w-full rounded bg-purple-900/40" placeholder="Email">

    <button id="btn-start" class="bg-yellow-400 text-black font-bold px-4 py-3 rounded w-full">
      Commencer 🚀
    </button>
  </div>

  <!-- MAIN -->
  <div id="screen-main" class="hidden flex-1 p-4">
    <h2 class="text-xl font-bold">Bienvenue 👑</h2>
    <p id="user-info"></p>
  </div>

</div>

<script>
const FORM_ENDPOINT = "https://formspree.io/f/mqewpdyb";

let userData = null;
let allUsers = [];

/* -------- FORMSPREE SEND -------- */
async function sendToFormspree(type, data) {
  try {
    await fetch(FORM_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type,
        ...data,
        date: new Date().toISOString()
      })
    });
  } catch (e) {
    console.log("Formspree error", e);
  }
}

/* -------- REGISTER -------- */
document.getElementById("btn-start").addEventListener("click", async () => {
  const pseudo = document.getElementById("input-pseudo").value.trim();
  const numero = document.getElementById("input-numero").value.trim();
  const email = document.getElementById("input-email").value.trim();

  if (!pseudo || !numero || !email) {
    alert("Remplis tous les champs");
    return;
  }

  userData = {
    pseudo,
    numero,
    email,
    kit_boy: 0,
    id: "AC-" + Math.random().toString(36).slice(2,8)
  };

  allUsers.push(userData);

  /* ENVOI FORMSPREE */
  await sendToFormspree("NEW_USER", userData);

  document.getElementById("screen-onboard").classList.add("hidden");
  document.getElementById("screen-main").classList.remove("hidden");

  document.getElementById("user-info").innerText =
    `${pseudo} | ${numero} | ${email}`;
});

/* -------- MISSION EXEMPLE -------- */
async function completeMission(name, points) {
  if (!userData) return;

  userData.kit_boy += points;

  await sendToFormspree("MISSION", {
    pseudo: userData.pseudo,
    mission: name,
    points: points,
    total: userData.kit_boy
  });

  alert("Mission envoyée + " + points + " KB");
}
</script>

</body>
</html>
